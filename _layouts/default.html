<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-type" content="text/html;charset=utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{{ page.title }}{% if page.url != "/" %} - nhphucqt{% endif %}</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

        <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
        <link rel="alternate icon" href="/assets/images/favicon.png">

        <link rel="stylesheet" href="/assets/css/styles.css">
        <link rel="stylesheet" href="/assets/css/syntax-highlight.css">
    </head>
    <body>
        {% include navigation.html %}
        <div class="content-parent">

            </div>

        <footer>

        <button id="scrolltop-button" class="scrolltop-button" onclick="scrollToTop()">

        <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

        <script src="/assets/js/clipboard.js"></script>
